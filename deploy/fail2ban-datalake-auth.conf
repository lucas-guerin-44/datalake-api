# /etc/fail2ban/filter.d/datalake-auth.conf
#
# Match Caddy's JSON access log for 401/403 responses. We key on the "status"
# field and extract the client IP from "remote_ip". Caddy's default JSON schema
# (as of v2) writes these keys at the top level of each log record.
#
# Copy this file to /etc/fail2ban/filter.d/datalake-auth.conf on the VPS.

[Definition]
failregex = ^.*"remote_ip":"<HOST>".*"status":40[13].*$
ignoreregex =
datepattern = "ts":{EPOCH}
